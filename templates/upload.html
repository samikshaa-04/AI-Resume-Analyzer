<!DOCTYPE html>
<html>

<head>

<title>Upload Resume</title>

<link rel="stylesheet" href="/statics/style.css">

</head>

<body>

<header class="navbar">
<h2>AI Resume Analyzer</h2>
</header>


<div class="upload-wrapper">

<h1 class="upload-title">Upload Your Resume</h1>

<p class="upload-subtitle">
Upload your resume and provide job details to analyze your fit for the role.
</p>


<div class="upload-card">

<form action="/analyze" method="POST" enctype="multipart/form-data">


<!-- Resume Upload -->

<div class="form-section">

<label>Upload Resume (PDF)</label>

<input type="file" id="resumeUpload" name="resume" accept=".pdf" required>

<p id="fileName" class="file-name"></p>

</div>



<!-- Job Role -->

<div class="form-section">

<label>Select Target Job Role</label>

<select name="job_role">

<option value="">Select Job Role</option>
<option>Software Developer</option>
<option>Web Developer</option>
<option>Backend Developer</option>
<option>Data Analyst</option>
<option>Data Scientist</option>

</select>

</div>



<!-- Job Description -->

<div class="form-section">

<label>Paste Job Description</label>

<textarea
name="job_description"
placeholder="Example: Python HTML CSS JavaScript MongoDB"
required></textarea>

</div>



<button class="analyze-btn">Analyze Resume</button>

</form>

</div>

</div>


<script>

const fileInput = document.getElementById("resumeUpload");
const fileNameText = document.getElementById("fileName");

fileInput.addEventListener("change", function(){

if(fileInput.files.length > 0){

const name = fileInput.files[0].name;

fileInput.style.display = "none";

fileNameText.innerText = "Selected File: " + name;

}

});

</script>


</body>

</html>
